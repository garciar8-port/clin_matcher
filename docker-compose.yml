services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trial_matcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trial_matcher
    ports:
      - "8123:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
